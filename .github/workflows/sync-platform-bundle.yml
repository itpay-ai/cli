name: Sync platform CLI bundle

on:
  workflow_call:
    inputs:
      bundle-format:
        description: Bundle format written to bundle.lock.json
        required: true
        type: string
      version-files:
        description: Comma-separated JSON files whose top-level version follows the CLI
        required: true
        type: string
      skill-path:
        description: Platform Skill directory
        default: skills/itpay
        type: string
      track-skill-diff:
        description: Draft the PR when the center Skill changed
        default: false
        type: boolean

concurrency:
  group: sync-itpay-cli-${{ github.repository }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout platform repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          path: platform

      - name: Checkout bundle tooling
        uses: actions/checkout@v7
        with:
          repository: itpay-ai/cli
          ref: main
          fetch-depth: 0
          path: cli
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Resolve published version
        id: version
        working-directory: platform
        env:
          BUNDLE_FORMAT: ${{ inputs.bundle-format }}
          SKILL_PATH: ${{ inputs.skill-path }}
        run: |
          set -euo pipefail
          VERSION=$(npm view @itpay/cli dist-tags.latest)
          CURRENT_VERSION=$(node -e 'console.log(require("./" + process.env.SKILL_PATH + "/bundle.lock.json").version)')
          CURRENT_FORMAT=$(node -e 'console.log(require("./" + process.env.SKILL_PATH + "/bundle.lock.json").format)')
          CURRENT_SOURCE_GIT_SHA=$(node -e 'console.log(require("./" + process.env.SKILL_PATH + "/bundle.lock.json").sourceGitSha)')
          echo "Published: $VERSION; bundled: $CURRENT_VERSION ($CURRENT_FORMAT)"
          echo "CURRENT_SOURCE_GIT_SHA=$CURRENT_SOURCE_GIT_SHA" >> "$GITHUB_ENV"
          if [[ "$VERSION" == "$CURRENT_VERSION" && "$BUNDLE_FORMAT" == "$CURRENT_FORMAT" ]]; then
            echo "update=false" >> "$GITHUB_OUTPUT"
          else
            echo "update=true" >> "$GITHUB_OUTPUT"
            echo "VERSION=$VERSION" >> "$GITHUB_ENV"
            echo "BRANCH=automation/itpay-cli-$VERSION" >> "$GITHUB_ENV"
          fi

      - name: Install bundle tooling
        if: steps.version.outputs.update == 'true'
        working-directory: cli
        run: npm ci --ignore-scripts

      - name: Prepare update branch
        if: steps.version.outputs.update == 'true'
        working-directory: platform
        run: |
          set -euo pipefail
          git config user.name "itpay-bundle-bot"
          git config user.email "itpay-bundle-bot@users.noreply.github.com"
          git fetch origin "$BRANCH:refs/remotes/origin/$BRANCH" || true
          git switch -C "$BRANCH" "$GITHUB_SHA"

      - name: Rebuild bundle
        if: steps.version.outputs.update == 'true'
        working-directory: cli
        env:
          BUNDLE_FORMAT: ${{ inputs.bundle-format }}
          SKILL_PATH: ${{ inputs.skill-path }}
        run: |
          set -euo pipefail
          case "$BUNDLE_FORMAT" in
            npm-tree) EXTRA=() ;;
            single-file-esm) EXTRA=(--single-file) ;;
            *) echo "Unsupported bundle format: $BUNDLE_FORMAT" >&2; exit 1 ;;
          esac
          node scripts/build-platform-bundle.mjs "$VERSION" "$GITHUB_WORKSPACE/platform/$SKILL_PATH" "${EXTRA[@]}"

      - name: Inspect upstream Skill changes
        if: steps.version.outputs.update == 'true'
        working-directory: cli
        env:
          SKILL_PATH: ${{ inputs.skill-path }}
          TRACK_SKILL_DIFF: ${{ inputs.track-skill-diff }}
        run: |
          set -euo pipefail
          DIFF_FILE="$RUNNER_TEMP/upstream-skill.diff"
          : > "$DIFF_FILE"
          echo "SKILL_REVIEW_REQUIRED=false" >> "$GITHUB_ENV"
          if [[ "$TRACK_SKILL_DIFF" != "true" ]]; then
            exit 0
          fi
          NEW_SOURCE_GIT_SHA=$(node -e 'console.log(require(process.env.GITHUB_WORKSPACE + "/platform/" + process.env.SKILL_PATH + "/bundle.lock.json").sourceGitSha)')
          echo "NEW_SOURCE_GIT_SHA=$NEW_SOURCE_GIT_SHA" >> "$GITHUB_ENV"
          git cat-file -e "$CURRENT_SOURCE_GIT_SHA^{commit}"
          git cat-file -e "$NEW_SOURCE_GIT_SHA^{commit}"
          git diff --no-ext-diff "$CURRENT_SOURCE_GIT_SHA" "$NEW_SOURCE_GIT_SHA" -- skills/itpay/SKILL.md > "$DIFF_FILE"
          if [[ -s "$DIFF_FILE" ]]; then
            echo "SKILL_REVIEW_REQUIRED=true" >> "$GITHUB_ENV"
          fi

      - name: Update platform versions
        if: steps.version.outputs.update == 'true'
        working-directory: platform
        env:
          VERSION_FILES: ${{ inputs.version-files }}
        run: |
          node -e '
            const fs = require("node:fs");
            const [version, value] = process.argv.slice(1);
            for (const file of value.split(",")) {
              const json = JSON.parse(fs.readFileSync(file, "utf8"));
              json.version = version;
              fs.writeFileSync(file, JSON.stringify(json, null, 2) + "\n");
            }
          ' "$VERSION" "$VERSION_FILES"

      - name: Verify platform bundle
        if: steps.version.outputs.update == 'true'
        working-directory: platform
        env:
          BUNDLE_FORMAT: ${{ inputs.bundle-format }}
          SKILL_PATH: ${{ inputs.skill-path }}
        run: |
          npm test
          node -e '
            const lock = require("./" + process.env.SKILL_PATH + "/bundle.lock.json");
            if (lock.version !== process.env.VERSION || lock.format !== process.env.BUNDLE_FORMAT) process.exit(1);
          '
          git diff --check

      - name: Push update branch
        if: steps.version.outputs.update == 'true'
        working-directory: platform
        run: |
          set -euo pipefail
          git add -A
          git commit -m "chore: update bundled CLI to $VERSION"
          git push --force-with-lease --set-upstream origin "$BRANCH"

      - name: Open update pull request
        if: steps.version.outputs.update == 'true'
        working-directory: platform
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BODY_FILE="$RUNNER_TEMP/pr-body.md"
          {
            printf 'Updates the bundled CLI to `@itpay/cli@%s`.\n\n' "$VERSION"
            printf -- '- Rebuilt from the published npm package\n- Refreshed integrity and source metadata\n- Passed the platform bundle test\n'
            if [[ "$SKILL_REVIEW_REQUIRED" == "true" ]]; then
              printf '\n## Center Skill review required\n\n'
              printf 'The center `skills/itpay/SKILL.md` changed between `%s` and `%s`. This PR is intentionally a draft and does not overwrite the platform Skill.\n\n' "$CURRENT_SOURCE_GIT_SHA" "$NEW_SOURCE_GIT_SHA"
              printf '```diff\n'
              sed -n '1,500p' "$RUNNER_TEMP/upstream-skill.diff"
              printf '```\n\n'
              printf -- '- [ ] Review the center Skill diff\n- [ ] Merge applicable business rules into the platform `SKILL.md` without removing platform rules\n- [ ] Confirm platform-specific Skill checks and `npm test` pass\n- [ ] Mark this PR ready for review\n'
            fi
          } > "$BODY_FILE"
          PR_URL=$(gh pr list --head "$BRANCH" --state open --json url --jq '.[0].url')
          if [[ -z "$PR_URL" ]]; then
            DRAFT=()
            if [[ "$SKILL_REVIEW_REQUIRED" == "true" ]]; then DRAFT=(--draft); fi
            PR_URL=$(gh pr create --base main --head "$BRANCH" --title "chore: update bundled CLI to $VERSION" --body-file "$BODY_FILE" "${DRAFT[@]}")
          else
            gh pr edit "$PR_URL" --body-file "$BODY_FILE"
            if [[ "$SKILL_REVIEW_REQUIRED" == "true" ]]; then gh pr ready --undo "$PR_URL" || true; fi
          fi
          echo "$PR_URL"
