name: CD — Publish to npm

on:
  push:
    branches: [main]
    paths:
      - package.json

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck, test, and verify packed CLI
        run: npm run check

      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG=latest
          if [[ "$VERSION" == *-* ]]; then
            TAG=next
          fi
          if npm view "@itpay/cli@$VERSION" version &>/dev/null; then
            PUBLISHED_GIT_HEAD=$(npm view "@itpay/cli@$VERSION" gitHead)
            if [[ "$PUBLISHED_GIT_HEAD" != "$GITHUB_SHA" ]]; then
              echo "Version $VERSION belongs to $PUBLISHED_GIT_HEAD, not $GITHUB_SHA — bump package version" >&2
              exit 1
            fi
            echo "Version $VERSION already published from this commit — skipping"
          else
            npm publish --access public --tag "$TAG"
            echo "Published @itpay/cli@$VERSION with dist-tag $TAG"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
